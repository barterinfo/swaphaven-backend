# Railway deploy config — https://docs.railway.app/reference/config-as-code
[build]
builder = "nixpacks"
buildCommand = "npm ci && npm run build"

# Ensures trust proxy + production defaults even if dashboard vars are missing
[env]
NODE_ENV = "production"
TRUST_PROXY = "true"

[deploy]
startCommand = "node dist/db/migrate.js && node dist/index.js"
healthcheckPath = "/api/readyz"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
