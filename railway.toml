# Legacy/config-as-code — Railway also reads railway.json (Dockerfile deploy).
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[env]
NODE_ENV = "production"
TRUST_PROXY = "true"

[deploy]
startCommand = "sh -c 'node dist/db/migrate.js && exec node dist/index.js'"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
