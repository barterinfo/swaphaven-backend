# Railway deploy config — https://docs.railway.app/reference/config-as-code
[build]
builder = "nixpacks"
buildCommand = "npm ci && npm run build"

# Ensures trust proxy + production defaults even if dashboard vars are missing
[env]
NODE_ENV = "production"
TRUST_PROXY = "true"

[deploy]
startCommand = "sh deploy/start.sh"
# Liveness only (200). Use /api/readyz manually to verify DB.
healthcheckPath = "/api/healthz"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
