name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: Typecheck, test, build & health
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: swaphaven
          POSTGRES_PASSWORD: swaphaven
          POSTGRES_DB: swaphaven_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U swaphaven -d swaphaven_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://swaphaven:swaphaven@localhost:5432/swaphaven_test
      JWT_ACCESS_SECRET: ci-access-secret-min-32-chars-long
      JWT_REFRESH_SECRET: ci-refresh-secret-min-32-chars-long
      PORT: "3001"
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Start API and check health
        run: |
          npm run start &
          SERVER_PID=$!
          cleanup() {
            if kill -0 "${SERVER_PID}" 2>/dev/null; then
              kill "${SERVER_PID}" 2>/dev/null || true
              wait "${SERVER_PID}" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT
          for i in $(seq 1 30); do
            if curl -sf "http://127.0.0.1:${PORT}/api/healthz"; then
              echo "API healthy"
              exit 0
            fi
            sleep 1
          done
          echo "::error::API did not become healthy in time"
          exit 1
